<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music Bot</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.3/Sortable.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #1e1f22;
      --panel:     #2b2d31;
      --surface:   #313338;
      --raised:    #383a40;
      --border:    #3f4147;
      --accent:    #5865f2;
      --accent-h:  #4752c4;
      --text:      #dbdee1;
      --muted:     #949ba4;
      --success:   #57f287;
      --danger:    #ed4245;
      --warn:      #fee75c;
      --radius:    6px;
    }

    html, body, #root { height: 100%; }
    body { font-family: "gg sans","Noto Sans",sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.4; }

    /* ---- Layout ---- */
    .layout { display: flex; flex-direction: column; height: 100%; }

    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px; height: 48px;
      background: var(--panel); border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .topbar-title { font-weight: 700; font-size: 15px; color: var(--text); }
    .now-playing {
      font-size: 12px; color: var(--muted); max-width: 400px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .now-playing b { color: var(--text); }

    .body { display: flex; flex: 1; overflow: hidden; }

    .sidebar {
      width: 220px; flex-shrink: 0;
      background: var(--panel); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow-y: auto;
      padding: 8px 0;
    }

    .sidebar-section { padding: 8px 12px 4px; font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); }

    .sidebar-item {
      display: flex; align-items: center;
      padding: 6px 12px; gap: 8px; cursor: pointer;
      border-radius: var(--radius); margin: 0 4px;
      transition: background .1s;
    }
    .sidebar-item:hover { background: var(--surface); }
    .sidebar-item.active { background: var(--raised); }
    .sidebar-item-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 13px; }
    .sidebar-badge { font-size: 11px; color: var(--muted); flex-shrink: 0; }
    .sidebar-icon { font-size: 14px; flex-shrink: 0; width: 16px; text-align: center; }

    .main { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

    /* ---- Editor Header ---- */
    .editor-header {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px; border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .editor-title { font-size: 16px; font-weight: 700; flex: 1; }
    .badge {
      font-size: 11px; padding: 2px 8px; border-radius: 10px;
      background: var(--surface); color: var(--muted); flex-shrink: 0;
    }
    .badge.pub { background: #1e3a22; color: var(--success); }

    /* ---- Buttons ---- */
    button {
      border: none; border-radius: var(--radius); cursor: pointer;
      font-family: inherit; font-size: 13px; font-weight: 500;
      transition: background .1s, opacity .1s;
    }
    button:disabled { opacity: .4; cursor: not-allowed; }

    .btn { padding: 6px 14px; background: var(--surface); color: var(--text); }
    .btn:hover:not(:disabled) { background: var(--raised); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-h); }
    .btn-danger { background: transparent; color: var(--danger); }
    .btn-danger:hover:not(:disabled) { background: rgba(237,66,69,.12); }
    .btn-sm { padding: 4px 10px; font-size: 12px; }
    .btn-icon { padding: 4px 6px; background: transparent; color: var(--muted); font-size: 14px; }
    .btn-icon:hover:not(:disabled) { color: var(--danger); background: rgba(237,66,69,.1); border-radius: 4px; }

    /* ---- Track list ---- */
    .track-scroll { flex: 1; overflow-y: auto; padding: 8px 0; }
    .track-list { list-style: none; padding: 0 12px; }
    .track-item {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 10px; border-radius: var(--radius);
      transition: background .1s;
    }
    .track-item:hover { background: var(--surface); }
    .track-item.sortable-ghost { opacity: .4; }
    .track-item.sortable-drag { background: var(--raised); box-shadow: 0 4px 16px rgba(0,0,0,.4); }

    .drag-handle {
      cursor: grab; color: var(--border); font-size: 16px;
      flex-shrink: 0; user-select: none; line-height: 1;
      transition: color .1s;
    }
    .track-item:hover .drag-handle { color: var(--muted); }
    .drag-handle:active { cursor: grabbing; }

    .track-num { color: var(--muted); font-size: 12px; width: 28px; text-align: right; flex-shrink: 0; }
    .track-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .track-url { font-size: 11px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .track-refresh { font-size: 11px; color: var(--warn); flex-shrink: 0; }

    .empty { text-align: center; padding: 48px 16px; color: var(--muted); }
    .empty-icon { font-size: 32px; margin-bottom: 8px; }

    /* ---- Add track bar ---- */
    .add-bar {
      display: flex; gap: 8px; padding: 12px 16px;
      border-top: 1px solid var(--border); flex-shrink: 0;
    }
    .add-input {
      flex: 1; padding: 8px 12px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text); font-family: inherit; font-size: 13px;
      outline: none; transition: border-color .1s;
    }
    .add-input:focus { border-color: var(--accent); }
    .add-input::placeholder { color: var(--muted); }

    /* ---- Dirty indicator ---- */
    .unsaved-bar {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 16px; background: #3a2e00; border-top: 1px solid #5a4a00;
      font-size: 13px; flex-shrink: 0;
    }
    .unsaved-bar span { flex: 1; color: var(--warn); }

    /* ---- Queue ---- */
    .queue-item { display: flex; align-items: center; gap: 10px; padding: 6px 10px; border-radius: var(--radius); }
    .queue-item:hover { background: var(--surface); }

    /* ---- Toast ---- */
    .toast-stack {
      position: fixed; bottom: 20px; right: 20px;
      display: flex; flex-direction: column; gap: 8px; z-index: 999;
      pointer-events: none;
    }
    .toast {
      padding: 10px 16px; border-radius: var(--radius);
      font-size: 13px; color: #fff; pointer-events: auto;
      animation: slide-in .2s ease;
      max-width: 320px;
    }
    .toast.ok   { background: #1a3d25; border: 1px solid var(--success); }
    .toast.err  { background: #3a1416; border: 1px solid var(--danger);  }
    .toast.info { background: var(--raised); border: 1px solid var(--border); }
    @keyframes slide-in { from { transform: translateX(40px); opacity: 0; } to { transform: none; opacity: 1; } }

    /* ---- Login ---- */
    .login-wrap { display: flex; align-items: center; justify-content: center; height: 100%; }
    .login-card {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 10px; padding: 40px 32px; width: 340px;
      display: flex; flex-direction: column; gap: 20px;
    }
    .login-card h1 { font-size: 20px; font-weight: 700; text-align: center; }
    .login-card p { font-size: 13px; color: var(--muted); text-align: center; }
    .login-input {
      width: 100%; padding: 10px 14px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text); font-family: inherit;
      font-size: 14px; outline: none;
    }
    .login-input:focus { border-color: var(--accent); }
    .login-error { color: var(--danger); font-size: 12px; text-align: center; }

    /* ---- Loading ---- */
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---- Scrollbar ---- */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ---- API client ----
    function makeApi(token) {
      const h = token ? { "Authorization": `Bearer ${token}`, "Content-Type": "application/json" } : { "Content-Type": "application/json" };
      const req = async (method, path, body) => {
        const r = await fetch(path, { method, headers: h, body: body ? JSON.stringify(body) : undefined });
        if (r.status === 401 || r.status === 403) throw new Error("AUTH");
        if (!r.ok) {
          let msg = `HTTP ${r.status}`;
          try { const d = await r.json(); msg = d.detail || msg; } catch {}
          throw new Error(msg);
        }
        if (r.status === 204) return null;
        return r.json();
      };
      return {
        playlists:       () => req("GET",    "/api/playlists"),
        playlist:        id => req("GET",    `/api/playlists/${id}`),
        patchPlaylist:   (id, body) => req("PATCH",  `/api/playlists/${id}`, body),
        removeTrack:     (id, idx)  => req("DELETE", `/api/playlists/${id}/tracks/${idx}`),
        addTrack:        (id, url)  => req("POST",   `/api/playlists/${id}/tracks`, { url }),
        queue:           () => req("GET",    "/api/queue"),
        nowPlaying:      () => req("GET",    "/api/now-playing"),
      };
    }

    // ---- Toast ----
    function useToasts() {
      const [toasts, setToasts] = useState([]);
      const add = useCallback((msg, type = "info") => {
        const id = Date.now();
        setToasts(t => [...t, { id, msg, type }]);
        setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3500);
      }, []);
      return [toasts, add];
    }

    // ---- SortableJS drag-and-drop ----
    function useSort(listRef, items, onReorder) {
      const sortRef = useRef(null);
      useEffect(() => {
        if (!listRef.current) return;
        if (sortRef.current) sortRef.current.destroy();
        sortRef.current = Sortable.create(listRef.current, {
          animation: 150,
          handle: ".drag-handle",
          ghostClass: "sortable-ghost",
          dragClass: "sortable-drag",
          onEnd(evt) {
            if (evt.oldIndex === evt.newIndex) return;
            const next = [...items];
            const [moved] = next.splice(evt.oldIndex, 1);
            next.splice(evt.newIndex, 0, moved);
            onReorder(next);
          },
        });
        return () => { if (sortRef.current) { sortRef.current.destroy(); sortRef.current = null; } };
      }, [items, onReorder]);
    }

    // ---- Login screen ----
    function LoginScreen({ onLogin }) {
      const [val, setVal] = useState("");
      const [err, setErr] = useState("");
      const [loading, setLoading] = useState(false);
      const submit = async e => {
        e.preventDefault();
        if (!val.trim()) return;
        setLoading(true);
        setErr("");
        try {
          await makeApi(val.trim()).playlists();
          onLogin(val.trim());
        } catch (ex) {
          setErr(ex.message === "AUTH" ? "Invalid token." : `Error: ${ex.message}`);
        } finally {
          setLoading(false);
        }
      };
      return (
        <div className="login-wrap">
          <form className="login-card" onSubmit={submit}>
            <h1>🎵 Music Bot</h1>
            <p>Enter your <code>WEBUI_SECRET_KEY</code> to continue.</p>
            <input
              className="login-input"
              type="password"
              placeholder="Access token"
              value={val}
              onChange={e => setVal(e.target.value)}
              autoFocus
            />
            {err && <div className="login-error">{err}</div>}
            <button className="btn btn-primary" disabled={loading || !val.trim()}>
              {loading ? <span className="spinner" /> : "Login"}
            </button>
          </form>
        </div>
      );
    }

    // ---- Track item (inside sortable list) ----
    function TrackItem({ track, index, onRemove }) {
      const id = track.id ? `youtu.be/${track.id}` : track.webpage_url;
      return (
        <li className="track-item">
          <span className="drag-handle" title="Drag to reorder">⠿</span>
          <span className="track-num">{index + 1}</span>
          <span className="track-title" title={track.title}>{track.title}</span>
          {track.needs_refresh && <span className="track-refresh" title="Will resolve on first play">⟳</span>}
          <span className="track-url" title={track.webpage_url}>{id}</span>
          <button className="btn-icon" onClick={() => onRemove(index)} title="Remove">✕</button>
        </li>
      );
    }

    // ---- Add track bar ----
    function AddTrackBar({ playlistId, api, onAdded, toast }) {
      const [val, setVal] = useState("");
      const [loading, setLoading] = useState(false);

      const submit = async e => {
        e.preventDefault();
        const url = val.trim();
        if (!url) return;
        if (!url.includes("youtube.com") && !url.includes("youtu.be")) {
          toast("Only YouTube URLs are supported.", "err");
          return;
        }
        setLoading(true);
        try {
          const res = await api.addTrack(playlistId, url);
          setVal("");
          if (res.duplicate) {
            toast(`Already in playlist: ${res.title}`, "info");
          } else {
            toast(`Added: ${res.title}`, "ok");
            onAdded();
          }
        } catch (ex) {
          toast(`Failed to add: ${ex.message}`, "err");
        } finally {
          setLoading(false);
        }
      };

      return (
        <form className="add-bar" onSubmit={submit}>
          <input
            className="add-input"
            type="text"
            placeholder="Paste a YouTube URL to add a track…"
            value={val}
            onChange={e => setVal(e.target.value)}
          />
          <button className="btn btn-primary btn-sm" disabled={loading || !val.trim()}>
            {loading ? <span className="spinner" /> : "Add"}
          </button>
        </form>
      );
    }

    // ---- Playlist editor ----
    function PlaylistEditor({ playlistId, api, toast }) {
      const [pl, setPl] = useState(null);
      const [tracks, setTracks] = useState([]);
      const [dirty, setDirty] = useState(false);
      const [saving, setSaving] = useState(false);
      const [loading, setLoading] = useState(true);
      const listRef = useRef(null);

      const load = useCallback(async () => {
        setLoading(true);
        try {
          const data = await api.playlist(playlistId);
          setPl(data);
          setTracks(data.tracks || []);
          setDirty(false);
        } catch (ex) {
          toast(`Failed to load playlist: ${ex.message}`, "err");
        } finally {
          setLoading(false);
        }
      }, [playlistId]);

      useEffect(() => { load(); }, [load]);

      const reorder = useCallback(next => {
        setTracks(next);
        setDirty(true);
      }, []);

      useSort(listRef, tracks, reorder);

      const removeTrack = idx => {
        setTracks(t => t.filter((_, i) => i !== idx));
        setDirty(true);
      };

      const save = async () => {
        setSaving(true);
        try {
          await api.patchPlaylist(playlistId, { tracks });
          setDirty(false);
          toast("Playlist saved.", "ok");
        } catch (ex) {
          toast(`Save failed: ${ex.message}`, "err");
        } finally {
          setSaving(false);
        }
      };

      const discard = () => {
        setTracks(pl?.tracks || []);
        setDirty(false);
      };

      if (loading) return <div className="empty"><div className="spinner" /></div>;
      if (!pl) return <div className="empty">Playlist not found.</div>;

      return (
        <>
          <div className="editor-header">
            <div className="editor-title">📋 {pl.name}</div>
            <span className={`badge${pl.visibility === "public" ? " pub" : ""}`}>{pl.visibility}</span>
            <span className="badge">{tracks.length} track{tracks.length !== 1 ? "s" : ""}</span>
          </div>

          <div className="track-scroll">
            {tracks.length === 0
              ? <div className="empty"><div className="empty-icon">📭</div>No tracks yet. Add one below.</div>
              : <ul ref={listRef} className="track-list">
                  {tracks.map((t, i) => (
                    <TrackItem key={t.id || `idx-${i}`} track={t} index={i} onRemove={removeTrack} />
                  ))}
                </ul>
            }
          </div>

          {dirty && (
            <div className="unsaved-bar">
              <span>Unsaved changes</span>
              <button className="btn btn-sm" onClick={discard}>Discard</button>
              <button className="btn btn-primary btn-sm" disabled={saving} onClick={save}>
                {saving ? <><span className="spinner" /> Saving…</> : "Save"}
              </button>
            </div>
          )}

          <AddTrackBar
            playlistId={playlistId}
            api={api}
            onAdded={load}
            toast={toast}
          />
        </>
      );
    }

    // ---- Queue panel ----
    function QueuePanel({ api, toast }) {
      const [queue, setQueue] = useState(null);
      const [loading, setLoading] = useState(true);

      const load = async () => {
        setLoading(true);
        try { setQueue(await api.queue()); }
        catch (ex) { toast(`Failed to load queue: ${ex.message}`, "err"); }
        finally { setLoading(false); }
      };

      useEffect(() => { load(); }, []);

      return (
        <>
          <div className="editor-header">
            <div className="editor-title">🎶 Current Queue</div>
            <span className="badge">{queue ? `${queue.length} track${queue.length !== 1 ? "s" : ""}` : "…"}</span>
            <button className="btn btn-sm" onClick={load}>↻ Refresh</button>
          </div>
          <div className="track-scroll">
            {loading
              ? <div className="empty"><div className="spinner" /></div>
              : !queue || queue.length === 0
                ? <div className="empty"><div className="empty-icon">🎵</div>Queue is empty.</div>
                : <ul className="track-list">
                    {queue.map((t, i) => (
                      <li key={t.id || i} className="queue-item">
                        <span className="track-num">{i + 1}</span>
                        <span className="track-title" title={t.title}>{t.title}</span>
                        <span className="track-url">{t.id ? `youtu.be/${t.id}` : t.url}</span>
                      </li>
                    ))}
                  </ul>
            }
          </div>
        </>
      );
    }

    // ---- Main app ----
    function App() {
      const [token, setToken] = useState(() => sessionStorage.getItem("mbtoken") || "");
      const [playlists, setPlaylists] = useState([]);
      const [selected, setSelected] = useState(null); // playlist id or "queue"
      const [nowPlaying, setNowPlaying] = useState(null);
      const [toasts, addToast] = useToasts();
      const api = makeApi(token);

      const onLogin = t => {
        sessionStorage.setItem("mbtoken", t);
        setToken(t);
      };

      const onAuthError = () => {
        sessionStorage.removeItem("mbtoken");
        setToken("");
        addToast("Session expired. Please log in again.", "err");
      };

      const safeApi = {};
      for (const [k, fn] of Object.entries(api)) {
        safeApi[k] = async (...args) => {
          try { return await fn(...args); }
          catch (ex) { if (ex.message === "AUTH") onAuthError(); throw ex; }
        };
      }

      // Load playlist list
      const loadPlaylists = useCallback(async () => {
        if (!token) return;
        try {
          const data = await safeApi.playlists();
          setPlaylists(data.filter(p => p.type !== "favorites"));
        } catch {}
      }, [token]);

      useEffect(() => { loadPlaylists(); }, [loadPlaylists]);

      // Poll now-playing every 10s
      useEffect(() => {
        if (!token) return;
        const poll = async () => {
          try { setNowPlaying(await safeApi.nowPlaying()); } catch {}
        };
        poll();
        const id = setInterval(poll, 10000);
        return () => clearInterval(id);
      }, [token]);

      if (!token) return <LoginScreen onLogin={onLogin} />;

      return (
        <div className="layout">
          {/* Top bar */}
          <div className="topbar">
            <div className="topbar-title">🎵 Music Bot</div>
            {nowPlaying
              ? <div className="now-playing">▶ <b>{nowPlaying.title}</b></div>
              : <div className="now-playing" style={{ color: "var(--muted)" }}>Not playing</div>
            }
            <button className="btn btn-sm" onClick={() => { sessionStorage.removeItem("mbtoken"); setToken(""); }}>
              Logout
            </button>
          </div>

          <div className="body">
            {/* Sidebar */}
            <div className="sidebar">
              <div className="sidebar-section">Playlists</div>
              {playlists.map(p => (
                <div
                  key={p.id}
                  className={`sidebar-item${selected === p.id ? " active" : ""}`}
                  onClick={() => setSelected(p.id)}
                >
                  <span className="sidebar-icon">{p.visibility === "public" ? "🌐" : "🔒"}</span>
                  <span className="sidebar-item-name" title={p.name}>{p.name}</span>
                  <span className="sidebar-badge">{p.track_count}</span>
                </div>
              ))}
              {playlists.length === 0 && (
                <div style={{ padding: "8px 16px", color: "var(--muted)", fontSize: 12 }}>
                  No playlists yet.<br />Use <code>/playlist new</code> in Discord.
                </div>
              )}
              <div style={{ borderTop: "1px solid var(--border)", margin: "8px 0" }} />
              <div className="sidebar-section">Bot</div>
              <div
                className={`sidebar-item${selected === "queue" ? " active" : ""}`}
                onClick={() => setSelected("queue")}
              >
                <span className="sidebar-icon">🎶</span>
                <span className="sidebar-item-name">Queue</span>
              </div>
            </div>

            {/* Main panel */}
            <div className="main">
              {selected === null && (
                <div className="empty" style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "center" }}>
                  <div className="empty-icon">←</div>
                  Select a playlist from the sidebar to edit it.
                </div>
              )}
              {selected === "queue" && <QueuePanel api={safeApi} toast={addToast} />}
              {selected && selected !== "queue" && (
                <PlaylistEditor
                  key={selected}
                  playlistId={selected}
                  api={safeApi}
                  toast={addToast}
                />
              )}
            </div>
          </div>

          {/* Toasts */}
          <div className="toast-stack">
            {toasts.map(t => (
              <div key={t.id} className={`toast ${t.type}`}>{t.msg}</div>
            ))}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
